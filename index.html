<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

.container{
    text-align:center;
    padding:20px;
}

h1{
    font-size:2.2rem;
    margin-bottom:40px;
}

button{
    font-size:1.3rem;
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:12px;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<div class="container">
    <h1>Yaraa yora yaryoraaaa...<h1>
    <h2>Will you marry me? 💍</h2>
    <button id="yes" onclick="sayYes()">Yes ❤️</button>
    <button id="no">No 😢</button>
</div>

<script>
const noBtn = document.getElementById("no");

function moveButton(){
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// Desktop
noBtn.addEventListener("mouseover", moveButton);

// Mobile
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

function sayYes(){
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:Arial;">
        <div>
            <h1>Agml yaryoooraaaa 🎉</h1>
            <h2>I adoooorrrreeee yoooouuuu ❤️</h2>
        </div>
    </div>
    `;
}
</script>

</body>
</html>
